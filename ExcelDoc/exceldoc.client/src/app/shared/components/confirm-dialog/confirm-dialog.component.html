<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button (click)="cancel()">{{ data.cancelLabel ?? 'Cancelar' }}</button>
  <button type="button" mat-flat-button color="primary" (click)="confirm()">{{ data.confirmLabel ?? 'Confirmar' }}</button>
</mat-dialog-actions>
