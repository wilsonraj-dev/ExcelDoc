<aside class="side-menu" *ngIf="isAuthenticated">
  <div class="side-menu__brand" aria-label="ExcelDoc" matTooltip="ExcelDoc" matTooltipPosition="right">
    <span class="side-menu__logo" aria-hidden="true">
      <mat-icon>deployed_code</mat-icon>
    </span>
    <span class="visually-hidden">ExcelDoc</span>
  </div>

  <mat-nav-list class="side-menu__nav" [attr.aria-label]="'layout.sideMenu.navAriaLabel' | translate">
    <a class="side-menu__link"
       mat-list-item
       *ngFor="let item of availableMenuItems"
       [routerLink]="item.route"
       routerLinkActive="is-active"
       [attr.aria-label]="item.labelKey | translate"
       [matTooltip]="item.labelKey | translate"
       matTooltipPosition="right"
       [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
      <mat-icon class="side-menu__icon" aria-hidden="true">{{ item.icon }}</mat-icon>
      <span class="visually-hidden">{{ item.labelKey | translate }}</span>
    </a>
  </mat-nav-list>
</aside>
