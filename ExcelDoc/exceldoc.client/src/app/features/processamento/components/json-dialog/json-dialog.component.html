<h2 mat-dialog-title>JSON — {{ 'processamento.jsonDialog.line' | translate }} {{ data.linhaExcel }}</h2>

<mat-dialog-content>
  <h4>{{ 'processamento.jsonDialog.sentJson' | translate }}</h4>
  <pre class="json-block">{{ formattedEnviado }}</pre>

  <h4>{{ 'processamento.jsonDialog.returnJson' | translate }}</h4>
  <pre class="json-block">{{ formattedRetorno }}</pre>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>{{ 'processamento.jsonDialog.close' | translate }}</button>
</mat-dialog-actions>
