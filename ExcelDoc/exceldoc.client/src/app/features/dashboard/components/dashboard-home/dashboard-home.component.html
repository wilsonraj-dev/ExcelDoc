<section class="feature-page">
  <header class="feature-page__header">
    <div>
      <span class="feature-page__eyebrow">Visão geral</span>
      <h2>Dashboard</h2>
      <p>Área inicial para navegação entre os domínios da plataforma.</p>
    </div>
  </header>

  <div class="feature-grid">
    <mat-card *ngFor="let card of cards" appearance="outlined">
      <mat-card-content>
        <h3>{{ card.title }}</h3>
        <p>{{ card.description }}</p>
      </mat-card-content>
    </mat-card>
  </div>
</section>
