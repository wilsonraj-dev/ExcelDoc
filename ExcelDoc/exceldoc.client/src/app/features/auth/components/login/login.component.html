<div class="login-container">
  <mat-card class="login-card">    
    <mat-card-header>
      <mat-card-title>Entrar</mat-card-title>
      <mat-card-subtitle>Acesse a plataforma usando usuário ou e-mail.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p class="feedback feedback--error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="feedback feedback--success" *ngIf="successMessage">{{ successMessage }}</p>

      <form class="login-form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuário ou e-mail</mat-label>
          <input matInput
                 type="text"
                 name="login"
                 [(ngModel)]="login"
                 placeholder="Digite seu usuário ou e-mail"
                 autocomplete="username" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput
                 [type]="hidePassword ? 'password' : 'text'"
                 name="senha"
                 [(ngModel)]="senha"
                 placeholder="Digite sua senha"
                 autocomplete="current-password" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="full-width login-btn" [disabled]="isSubmitting">
          <mat-spinner *ngIf="isSubmitting" diameter="20" class="spinner-inline"></mat-spinner>
          <span>{{ isSubmitting ? 'Entrando...' : 'Entrar' }}</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end" class="login-card__actions">
      <a mat-button routerLink="/login/criar-usuario">Criar usuário</a>
      <a mat-button routerLink="/login/esqueci-a-senha" [queryParams]="login ? { email: login } : null">Esqueci a senha</a>
    </mat-card-actions>
  </mat-card>
</div>
