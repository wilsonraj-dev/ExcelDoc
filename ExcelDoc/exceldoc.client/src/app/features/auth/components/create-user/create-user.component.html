<mat-card class="card" appearance="outlined">
  <mat-card-content>
    <div class="auth-card">
      <div class="auth-card__header">
        <h2>Criar usuário</h2>
        <p>Cadastre um novo acesso para a plataforma.</p>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()">
        <label>
          <span>Usuário</span>
          <input type="text" name="nomeUsuario" [(ngModel)]="nomeUsuario" placeholder="Informe o nome do usuário" autocomplete="username" />
        </label>

        <label>
          <span>E-mail</span>
          <input type="email" name="email" [(ngModel)]="email" placeholder="Informe o e-mail" autocomplete="email" />
        </label>

        <label>
          <span>Senha</span>
          <input type="password" name="senha" [(ngModel)]="senha" placeholder="Crie uma senha" autocomplete="new-password" />
        </label>

        <label>
          <span>Confirmar senha</span>
          <input type="password" name="confirmacaoSenha" [(ngModel)]="confirmacaoSenha" placeholder="Repita a senha" autocomplete="new-password" />
        </label>

        <button type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Criando...' : 'Criar usuário' }}
        </button>
      </form>

      <p class="feedback feedback--error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="feedback feedback--success" *ngIf="successMessage">{{ successMessage }}</p>
      <a *ngIf="registeredEmail"
         class="action-link"
         routerLink="/login"
         [queryParams]="{ login: registeredEmail, message: 'Usuário criado com sucesso. Faça seu login.' }">
        Ir para o login com o e-mail preenchido
      </a>

      <div class="auth-links">
        <a routerLink="/login">Voltar para login</a>
         <a routerLink="/login/esqueci-a-senha" [queryParams]="email ? { email: email } : null">Esqueci a senha</a>
      </div>
    </div>
  </mat-card-content>
</mat-card>
