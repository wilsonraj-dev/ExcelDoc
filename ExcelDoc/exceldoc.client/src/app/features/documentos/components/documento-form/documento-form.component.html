<mat-card class="documento-form" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ pageTitle }}</mat-card-title>
    <mat-card-subtitle>Preencha os dados do documento para manter o cadastro atualizado.</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="documento-form__content">
    <div class="documento-form__loading" *ngIf="isLoading">
      <app-loading-spinner message="Carregando documento..."></app-loading-spinner>
    </div>

    <form class="documento-form__fields" [formGroup]="form" (ngSubmit)="submit()" *ngIf="!isLoading">
      <p class="documento-form__error" *ngIf="apiError">{{ apiError }}</p>

      <mat-form-field appearance="outline">
        <mat-label>Nome do documento</mat-label>
        <input matInput formControlName="nomeDocumento" placeholder="Ex.: Nota Fiscal de Entrada" />
        <mat-error *ngIf="isInvalid('nomeDocumento')">{{ getErrorMessage('nomeDocumento') }}</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Endpoint</mat-label>
        <input matInput formControlName="endpoint" placeholder="Ex.: /PurchaseInvoices" />
        <mat-error *ngIf="isInvalid('endpoint')">{{ getErrorMessage('endpoint') }}</mat-error>
      </mat-form-field>

      <div class="documento-form__actions">
        <button type="button" mat-stroked-button (click)="cancel()" [disabled]="isSaving">
          Cancelar
        </button>
        <button type="submit" mat-flat-button color="primary" [disabled]="isSaving">
          {{ submitLabel }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
